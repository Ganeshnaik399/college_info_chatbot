<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Info Chatbot</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
  <!-- Left panel -->
  <div class="know-about">
    <div class="profile">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="profile">
    </div>
    <div class="info">
      <h2> CMR College Chatbot !</h2>
      <p>Ask me anything about our campus </p>
    </div>
    <ul class="menu">
      <li><button onclick="sendQuickMessage('timings')"><i class='bx bx-time'></i> Timings</button></li>
      <li><button onclick="sendQuickMessage('course')"><i class='bx bx-book'></i> Courses</button></li>
      <li><button onclick="sendQuickMessage('faculty')"><i class='bx bx-user'></i> Faculty</button></li>
      <li><button onclick="sendQuickMessage('syllabus')"><i class='bx bx-notepad'></i> Syllabus</button></li>
      <li><button onclick="sendQuickMessage('internship')"><i class='bx bx-briefcase'></i> Internship</button></li>
      <li><button onclick="sendQuickMessage('fee structure')"><i class='bx bx-money'></i> Fee Structure</button></li>
      <li><button onclick="sendQuickMessage('ragging')"><i class='bx bx-shield'></i> Ragging</button></li>
      <li><button onclick="sendQuickMessage('high package')"><i class='bx bx-trending-up'></i> High Package</button></li>
      <li><button onclick="sendQuickMessage('placements')"><i class='bx bx-building'></i> Placements</button></li>
      <li><button onclick="sendQuickMessage('location')"><i class='bx bx-map'></i> Location</button></li>
    </ul>
  </div>

  <!-- Right panel -->
  <div class="chat-container">
    <div class="chat-header">🎓 College Info Assistant</div>
    <div id="chat-box" class="chat-box"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your question here...">
      <button id="startBtn" class="mic">🎙️</button>
      <button  onclick="sendMessage()"><i class='bx bx-send'></i></button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
